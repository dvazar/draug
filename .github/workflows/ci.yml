name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --features _test_support -- -D warnings
      - run: cargo test --all-targets --features _test_support

  # Coverage runs separately so the gate above stays fast. cargo-llvm-cov is
  # source-based (LLVM) and instruments every built target -- including the
  # `draug` and `fake_target` binaries the lifecycle tests spawn -- so coverage
  # from the supervisor exercised via subprocess is captured, not just the unit
  # tests. `--features _test_support` (NOT --all-features: that would enable the
  # `sentry` feature, which is a deliberate compile_error! stub).
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage (Codecov format)
        run: >-
          cargo llvm-cov --all-targets --features _test_support
          --codecov --output-path codecov.json
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: codecov.json
          fail_ci_if_error: false
